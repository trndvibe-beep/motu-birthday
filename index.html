<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romantic 3D Surprise</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
background:linear-gradient(-45deg,#ff006e,#c9184a,#7209b7,#560bad);
background-size:400% 400%;
animation:gradient 8s ease infinite;
overflow:hidden;
color:white;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Countdown */
.countdown{
position:absolute;
top:20px;
font-size:20px;
font-weight:bold;
text-shadow:0 0 10px white;
}

/* 3D Card */
.scene{
width:320px;
height:420px;
perspective:1000px;
}

.card{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform 1s;
cursor:pointer;
}

.card.flipped{
transform:rotateY(180deg);
}

.card-face{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:25px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
box-shadow:0 0 40px rgba(255,255,255,0.3);
}

.card-back{
transform:rotateY(180deg);
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
background:white;
color:#ff006e;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

img{
width:100%;
border-radius:20px;
margin-top:15px;
box-shadow:0 0 20px pink;
}

.typing{
margin-top:15px;
min-height:60px;
text-align:center;
}

.love{
font-size:35px;
margin-top:15px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="countdown" id="countdown"></div>

<div class="scene">
<div class="card" id="card">

<div class="card-face card-front">
<h2>Click To Open Surprise 💖</h2>
<button>Open Card</button>
</div>

<div class="card-face card-back">
<h2>Happy Birthday 🎂</h2>
<img src="ppic.png">
<div class="typing" id="typing"></div>
<div class="love" id="love" style="display:none;">MOTU PAKORI 💕</div>
</div>

</div>
</div>

<script>
const card=document.getElementById("card");
const typing=document.getElementById("typing");
const love=document.getElementById("love");

card.addEventListener("click",()=>{
card.classList.toggle("flipped");
if(card.classList.contains("flipped")){
startTyping();
}
});

/* Typing Effect */
const messages=[
"You Are My Favorite Person ❤️",
"May Allah Give You Long Life ✨",
"You Make My World Beautiful 💖",
"you are so pretty litle pakori  😘"
];

function startTyping(){
let i=0;
let j=0;
typing.innerHTML="";

function type(){
if(i<messages.length){
if(j<messages[i].length){
typing.innerHTML+=messages[i].charAt(j);
j++;
setTimeout(type,50);
}else{
typing.innerHTML+="<br><br>";
i++;
j=0;
setTimeout(type,800);
}
}else{
love.style.display="block";
}
}
type();
}

/* Countdown Timer */
const targetDate=new Date("March 10, 2026 00:00:00").getTime(); // Yahan date change karo

const countdown=document.getElementById("countdown");

setInterval(()=>{
const now=new Date().getTime();
const distance=targetDate-now;

const days=Math.floor(distance/(1000*60*60*24));
const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
const seconds=Math.floor((distance%(1000*60))/1000);

if(distance>0){
countdown.innerHTML=`🎉 Birthday In: ${days}d ${hours}h ${minutes}m ${seconds}s`;
}else{
countdown.innerHTML="🎂 It's Her Special Day 💖";
}
},1000);
</script>

</body>
</html>
